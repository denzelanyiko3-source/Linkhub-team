<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - LinkHub</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">LH</div>
      <div class="topbar-search">
        <span style="font-size: 0.85rem; color: #65676b;">💚</span>
        <input placeholder="Search LinkHub" />
      </div>
    </div>

    <nav class="topbar-center">
      <a href="../index.html" class="topbar-link">Home</a>
      <a href="groups.html" class="topbar-link">Groups</a>
      <a href="events.html" class="topbar-link">Events</a>
    </nav>

    <div class="topbar-right">
      <div class="avatar-small">JM</div>
      <span>Joe Maina</span>
      <a href="login.html" class="chip" style="text-decoration: none;">Sign In</a>
      <a href="admin.html" class="chip" style="text-decoration: none;">Admin</a>
      <button id="logout-button" class="chip logout-btn" style="display: none; border: none; background: #e4e6eb;">Sign Out</button>
      <div id="dark-mode-toggle" class="chip" style="cursor: pointer;">🌙</div>
      <div class="chip">⏱</div>
    </div>
  </header>

  <main class="layout profile-layout">
    <section class="card profile-shell">
      <div class="profile-container-wrap">
        <div data-profile-container class="profile-container"></div>
      </div>

      <div class="profile-stats-grid">
        <div class="profile-side-card">
          <div class="profile-side-card-inner">
            <div class="card-subtitle">Quick actions</div>
            <div class="profile-quick-actions">
              <a href="groups.html" class="btn-primary">Browse Groups</a>
              <a href="events.html" class="btn-primary">Find Events</a>
            </div>
          </div>
        </div>

        <div class="profile-side-card">
          <div class="profile-side-card-inner">
            <div class="card-subtitle">Security</div>
            <div class="profile-side-text">
              Sign out from the top bar to end your session.
            </div>
          </div>
        </div>

        <div class="profile-side-card">
          <div class="profile-side-card-inner">
            <div class="card-subtitle">Admin</div>
            <div class="profile-side-text">
              If your account is an admin, you’ll see the Admin link.
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/app.js"></script>
</body>
</html>
