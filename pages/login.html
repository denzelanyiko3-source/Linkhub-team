<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LinkHub</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">LH</div>
      <div class="topbar-search">
        <span style="font-size: 0.85rem; color: #65676b;">🔍</span>
        <input placeholder="Search LinkHub" />
      </div>
    </div>
    <nav class="topbar-center">
      <a href="../index.html" class="topbar-link">Home</a>
      <a href="groups.html" class="topbar-link">Groups</a>
      <a href="events.html" class="topbar-link">Events</a>
    </nav>
    <div class="topbar-right">
      <a href="admin.html" class="chip" style="text-decoration: none;">Admin</a>
      <button id="logout-button" class="chip logout-btn" style="display: none; border: none; background: #e4e6eb;">Sign Out</button>
      <div id="dark-mode-toggle" class="chip" style="cursor: pointer;">🌙</div>
      <div class="chip">⋯</div>
    </div>
  </header>

  <main class="layout" style="padding-top: 2rem;">
    <section style="max-width: 520px; margin: 0 auto;">
      <div class="card">
        <h1>Welcome to LinkHub</h1>
        <p>Sign in to manage posts, join groups, and access the admin dashboard.</p>
        <form id="login-form" style="display: grid; gap: 1rem; margin-top: 1rem;">
          <input type="email" name="email" placeholder="Email" required />
          <input type="password" name="password" placeholder="Password" required />
          <button type="submit" class="btn-primary">Sign In</button>
          <div id="login-error" style="color: var(--danger); font-size: 0.95rem;"></div>
        </form>
        <div class="form-note">
          New to LinkHub? <a href="register.html" class="form-link">Create an account</a>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/login.js"></script>
</body>
</html>
